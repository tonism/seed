agent litellm
label LiteLLM
kind gateway
wire openai-chat
host {litellm_host}
port 443
path /v1/chat/completions
auth bearer
model {model}
end

agent openrouter
label OpenRouter
kind gateway
wire openai-chat
host openrouter.ai
port 443
path /api/v1/chat/completions
auth bearer
model {model}
end

agent portkey
label Portkey
kind gateway
wire openai-chat
host api.portkey.ai
port 443
path /v1/chat/completions
auth header x-portkey-api-key
model {model}
end

agent cloudflare
label Cloudflare
kind gateway
wire openai-chat
host gateway.ai.cloudflare.com
port 443
path /v1/{account}/{gateway}/openai/chat/completions
auth bearer
model {model}
end

agent helicone
label Helicone
kind gateway
wire openai-chat
host oai.helicone.ai
port 443
path /v1/chat/completions
auth bearer
header helicone-auth {helicone_key}
model {model}
end

agent openai
label OpenAI
kind vendor
wire openai-responses
host api.openai.com
port 443
path /v1/responses
auth bearer
model {model}
end

agent anthropic
label Anthropic
kind vendor
wire anthropic-messages
host api.anthropic.com
port 443
path /v1/messages
auth header x-api-key
header anthropic-version 2023-06-01
model {model}
end

agent google
label Google
kind vendor
wire google-generate
host generativelanguage.googleapis.com
port 443
path /v1beta/models/{model}:generateContent
auth header x-goog-api-key
model {model}
end
